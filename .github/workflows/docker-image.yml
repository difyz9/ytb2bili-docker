name: Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to pull binaries from (e.g. v0.0.18). Leave empty to use the latest release.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (sparse — only need Shanghai.zone + config template) ──────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker/Shanghai.zone
            config.toml.example
          sparse-checkout-cone-mode: false

      # ── 2. Resolve release tag ────────────────────────────────────────────────
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            # Triggered by a tag push — use that tag
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            # Manual dispatch with explicit tag
            TAG="${{ github.event.inputs.tag }}"
          else
            # Manual dispatch without tag — fetch latest release from GitHub API
            TAG=$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/latest \
              | jq -r '.tag_name')
            echo "ℹ️  No tag specified — using latest release: ${TAG}"
          fi
          echo "value=${TAG}" >> $GITHUB_OUTPUT
          echo "✅ Release tag: ${TAG}"

      # ── 3. Download pre-built Linux binaries from GitHub Releases ─────────────
      - name: Download release binaries
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          echo "📥 Downloading linux/amd64 binary (${TAG})..."
          curl -fsSL "${BASE_URL}/ytb2bili-linux-amd64.tar.gz" -o amd64.tar.gz
          tar -xzf amd64.tar.gz ytb2bili-linux-amd64
          rm amd64.tar.gz

          echo "📥 Downloading linux/arm64 binary (${TAG})..."
          curl -fsSL "${BASE_URL}/ytb2bili-linux-arm64.tar.gz" -o arm64.tar.gz
          tar -xzf arm64.tar.gz ytb2bili-linux-arm64
          rm arm64.tar.gz

          chmod +x ytb2bili-linux-amd64 ytb2bili-linux-arm64
          echo "✅ Binaries:"
          ls -lh ytb2bili-linux-amd64 ytb2bili-linux-arm64

      # ── 4. Prepare Docker build context ──────────────────────────────────────
      - name: Prepare build context
        run: |
          cp config.toml.example config.toml
          cp docker/Shanghai.zone Shanghai.zone

          # Inline Dockerfile — base image provides yt-dlp, ffmpeg, etc.
          cat > Dockerfile.ci << 'EOF'
          FROM difyz9/ytb2bili-base:latest

          # BuildKit sets TARGETARCH automatically (amd64 / arm64)
          ARG TARGETARCH=amd64

          LABEL maintainer="difyz9" image="difyz9/ytb2bili"

          WORKDIR /app

          # Timezone — no apt-get needed
          RUN mkdir -p /usr/share/zoneinfo/Asia
          COPY Shanghai.zone /usr/share/zoneinfo/Asia/Shanghai
          RUN ln -sf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime \
              && echo "Asia/Shanghai" > /etc/timezone

          # Pre-built binary for the target architecture
          COPY ytb2bili-linux-${TARGETARCH} ./ytb2bili

          # Default config (override with volume mount at runtime)
          COPY config.toml ./config.toml

          RUN mkdir -p ./data ./media ./backend \
              && chmod +x ./ytb2bili \
              && cp ./config.toml ./backend/config.toml

          EXPOSE 8096

          CMD ["./ytb2bili"]
          EOF

          echo "Build context:"
          ls -lh ytb2bili-linux-amd64 ytb2bili-linux-arm64 config.toml Shanghai.zone Dockerfile.ci

      # ── 5. Docker buildx setup ────────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 6. Image metadata ─────────────────────────────────────────────────────
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: difyz9/ytb2bili
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ steps.tag.outputs.value }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=ytb2bili
            org.opencontainers.image.description=YouTube to Bilibili — download, transcribe and auto-upload videos
            org.opencontainers.image.url=https://github.com/zolagz/ytb2bili
            org.opencontainers.image.source=https://github.com/zolagz/ytb2bili
            org.opencontainers.image.version=${{ steps.tag.outputs.value }}

      # ── 7. Build & push multi-platform image ──────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## ✅ Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** GitHub Release \`${{ steps.tag.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "**Base image:** \`difyz9/ytb2bili-base:latest\` (pulled fresh)" >> $GITHUB_STEP_SUMMARY
