

# ============================================================================
# 应用基础配置
# ============================================================================

[server]
host = "0.0.0.0"
port = 8096
static_dir = "./media"
static_path = "/static"

# ============================================================================
# 数据库配置（MySQL for Docker）
# ============================================================================
[database]
type = "mysql"
host = "mysql"                 # Docker Compose 服务名
port = 3306
user = "ytb2bili"              # 与 docker-compose.yml 一致
password = "ytb2bili@123"
dbname = "bili_up"             # 数据库名（注意是 dbname 不是 database）
sslmode = ""                   # MySQL 不使用（仅 PostgreSQL 需要）
timezone = "Asia/Shanghai"     # 时区配置
auto_migrate = true
table_prefix = ""

# ============================================================================
# 视频处理工作流配置
# ============================================================================
[workflow]
download_dir = "./media"
ytdlp_path = "/usr/local/bin/yt-dlp"
ffmpeg_path = "/usr/bin/ffmpeg"
llm_translation_enabled = false
llm_translation_batch_size = 25
llm_translation_max_workers = 3
llm_translation_context_size = 2
llm_translation_source_lang = "en"
llm_translation_target_lang = "zh-Hans"
tts_enabled = false

# ============================================================================
# Agent & LLM 配置（可选，不使用 LLM 可不配置）
# ============================================================================
[agent]
name = "ytb2bili_agent"

[agent.llm]
provider = "openai"
api_key = ""  # 留空表示不使用 LLM
model = "gpt-4"

# DeepSeek 示例（base_url 可省略，已内置 https://api.deepseek.com/v1）
# provider = "deepseek"
# api_key = "sk-..."
# model = "deepseek-chat"      # 可选: deepseek-chat, deepseek-reasoner

# OpenRouter 示例
# provider = "openrouter"
# api_key = "sk-or-v1-..."
# base_url = "https://openrouter.ai/api/v1"
# model = "anthropic/claude-3-sonnet"



[updater]
enabled = true
auto_update = false
check_interval = 24
